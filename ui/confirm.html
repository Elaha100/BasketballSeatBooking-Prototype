<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm Booking</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="split-bg">
  <header class="page-header">
    <a class="back-link" href="page2.html">← Back</a>
    <h1 class="page-title">Confirm Booking</h1>
    <p class="page-subtitle">Review and finish your booking</p>
  </header>

  <main class="confirm-layout">
    <section class="card-mini confirm-card">
      <h2 class="team-name">Lakers vs Chicago</h2>
      <p class="muted">United Center • Friday 6 June • 4:00 PM</p>

      <hr class="divider" />

      <p id="teamLine"><strong>Team:</strong> -</p>
      <p id="seatsLine"><strong>Seats:</strong> -</p>

      <button id="finishBtn" class="btn">Finish Booking</button>
      <p id="doneMsg" class="muted"></p>
    </section>
  </main>

<script>
  const teamLine = document.getElementById("teamLine");
  const seatsLine = document.getElementById("seatsLine");
  const finishBtn = document.getElementById("finishBtn");

  const dataRaw = localStorage.getItem("bookingData");

  if (!dataRaw) {
    teamLine.innerHTML = "<strong>Team:</strong> (no data)";
    seatsLine.innerHTML = "<strong>Seats:</strong> (no data)";
    finishBtn.disabled = true;
  } else {
    const data = JSON.parse(dataRaw);
    teamLine.innerHTML = `<strong>Team:</strong> ${data.team}`;
    seatsLine.innerHTML = `<strong>Seats:</strong> ${data.seats.join(", ")}`;
  }

  finishBtn.addEventListener("click", () => {
    // move bookingData -> lastBooking for thanks.html
    const current = localStorage.getItem("bookingData");
    if (current) {
      localStorage.setItem("lastBooking", current);
      localStorage.removeItem("bookingData");
    }
    window.location.href = "thanks.html";
  });
</script>
</body>
</html>
